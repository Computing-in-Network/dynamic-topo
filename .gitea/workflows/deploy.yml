name: build-and-deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (host-safe)
        run: |
          set -eux
          REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          WORKDIR="${RUNNER_TEMP}/repo-${GITHUB_RUN_ID}-${GITHUB_JOB}"
          rm -rf "${WORKDIR}"
          git clone "${REPO_URL}" "${WORKDIR}"
          cd "${WORKDIR}"
          git checkout "${GITHUB_SHA}"
          echo "WORKDIR=${WORKDIR}" >> "${GITHUB_ENV}"

      - name: Install uv
        run: |
          set -eux
          if ! command -v uv >/dev/null 2>&1; then
            python3 -m pip install --user uv
            echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          fi

      - name: Install deps
        run: |
          set -eux
          cd "${WORKDIR}"
          uv sync --dev

      - name: Run tests
        run: |
          set -eux
          cd "${WORKDIR}"
          uv run python -m pytest -q

  build_and_deploy:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout (host-safe)
        run: |
          set -eux
          REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          WORKDIR="${RUNNER_TEMP}/repo-${GITHUB_RUN_ID}-${GITHUB_JOB}"
          rm -rf "${WORKDIR}"
          git clone "${REPO_URL}" "${WORKDIR}"
          cd "${WORKDIR}"
          git checkout "${GITHUB_SHA}"
          echo "WORKDIR=${WORKDIR}" >> "${GITHUB_ENV}"

      - name: Compute image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::12}" >> $GITHUB_ENV

      - name: Docker login
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login "${{ secrets.REGISTRY }}" -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Build backend image
        run: |
          set -eux
          cd "${WORKDIR}"
          docker build -f Dockerfile.backend -t ${{ secrets.REGISTRY }}/${{ secrets.IMAGE_NAMESPACE }}/dynamic-topo-backend:${IMAGE_TAG} .

      - name: Build frontend image
        run: |
          set -eux
          cd "${WORKDIR}"
          docker build -f frontend/Dockerfile -t ${{ secrets.REGISTRY }}/${{ secrets.IMAGE_NAMESPACE }}/dynamic-topo-frontend:${IMAGE_TAG} ./frontend

      - name: Push backend image
        run: docker push ${{ secrets.REGISTRY }}/${{ secrets.IMAGE_NAMESPACE }}/dynamic-topo-backend:${IMAGE_TAG}

      - name: Push frontend image
        run: docker push ${{ secrets.REGISTRY }}/${{ secrets.IMAGE_NAMESPACE }}/dynamic-topo-frontend:${IMAGE_TAG}

      - name: Deploy on local runner
        run: |
          set -eux
          mkdir -p "${{ secrets.DEPLOY_PATH }}"
          cp "${WORKDIR}/deploy/docker-compose.prod.yml" "${{ secrets.DEPLOY_PATH }}/docker-compose.prod.yml"
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login "${{ secrets.REGISTRY }}" -u "${{ secrets.REGISTRY_USER }}" --password-stdin
          cd "${{ secrets.DEPLOY_PATH }}"
          export IMAGE_REPO=${{ secrets.REGISTRY }}/${{ secrets.IMAGE_NAMESPACE }}
          export IMAGE_TAG=${IMAGE_TAG}
          docker rm -f topo-backend topo-frontend 2>/dev/null || true
          docker compose -f docker-compose.prod.yml down --remove-orphans || true
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d --remove-orphans
